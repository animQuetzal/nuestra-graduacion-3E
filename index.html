<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Ceremonia de Graduación</title>
    
    <meta property="og:title" content="Ceremonia de Graduación">
    <meta property="og:description" content="Te invitamos a celebrar con nosotros este maravilloso logro. ¡Confirma tu asistencia!">
    <meta property="og:image" content="02_invitacion.png">
    <meta property="og:url" content="">
    <meta property="og:type" content="website">
    <style>
        /* RESETEO TOTAL */
        html, body {
            margin: 0;
            padding: 0;
            background-color: #000000; 
            display: flex;
            flex-direction: column;
            align-items: center;
        }

        .canvas-celular {
            max-width: 450px;
            width: 100%;
            background-color: #FFFFFF;
            display: flex;
            flex-direction: column;
        }

        .seccion {
            width: 100%;
            position: relative; 
            line-height: 0;
            font-size: 0;
            display: block;
        }

        .seccion img, .seccion video {
            width: 100%;
            height: auto;
            margin: 0;
            padding: 0;
            display: block;
            border: none;
        }

        /* 1. DISEÑO DEL CONTADOR */
        .contador-flotante {
            position: absolute;
            bottom: 22%; 
            left: 50%; 
            transform: translateX(-50%); 
            width: 65%; 
            background: #FFFFFF; 
            border-radius: 10px; 
            box-shadow: 0 4px 15px rgba(0, 0, 0, 0.2);
            display: flex;
            justify-content: space-around;
            padding: 10px 0; 
            box-sizing: border-box;
            line-height: 1.2; 
        }

        .time-box { text-align: center; }

        .time-box span {
            display: block;
            color: #042a67; 
            font-size: 1.4rem; 
            font-weight: bold;
            font-family: 'Arial', sans-serif;
        }

        .time-box label {
            color: #042a67; 
            font-size: 0.5rem; 
            text-transform: uppercase;
            font-weight: bold;
            font-family: 'Arial', sans-serif;
        }

        /* 2. BOTÓN DE UBICACIÓN */
        .btn-ubicacion {
            position: absolute;
            top: 38%; 
            left: 80%;
            transform: translateX(-50%); 
            background-color: #D4AF37; 
            color: #FFFFFF; 
            text-decoration: none;
            padding: 10px 25px;
            border-radius: 25px;
            font-family: 'Arial', sans-serif;
            font-weight: bold;
            text-transform: uppercase;
            font-size: 0.9rem;
            box-shadow: 0 4px 10px rgba(0,0,0,0.3);
            z-index: 5;
            white-space: nowrap; 
            line-height: 1.5; 
        }

        /* 3. SCROLL DE ALUMNOS */
        .contenedor-scroll-alumnos {
            position: absolute;
            top: 15%;    
            bottom: 15%; 
            left: 10%;   
            right: 10%;  
            overflow-y: auto; 
            line-height: 1.5; 
            padding: 10px;
        }

        .contenedor-scroll-alumnos::-webkit-scrollbar { width: 4px; }
        .contenedor-scroll-alumnos::-webkit-scrollbar-thumb {
            background-color: rgba(4, 42, 103, 0.3);
            border-radius: 4px;
        }

        .alumno-item {
            text-align: center;
            margin-bottom: 20px;
            font-family: 'Arial', sans-serif;
        }

        .alumno-nombre {
            color: #042a67;
            font-size: 1.2rem;
            font-weight: bold;
            margin: 0;
        }

        .padrino-nombre {
            color: #555555;
            font-size: 0.9rem;
            margin: 0;
            font-style: italic;
        }
    </style>
</head>
<body>

    <div class="canvas-celular">
        
        <div class="seccion">
            <video autoplay loop muted playsinline>
                <source src="portada.mp4" type="video/mp4">
            </video>
        </div>

        <div class="seccion">
            <img src="02_invitacion.png" alt="Detalles de Invitación" onerror="this.src='02_invitacion.jpg'">
            <div id="countdown" class="contador-flotante">
                <div class="time-box"><span id="days">00</span><label>Días</label></div>
                <div class="time-box"><span id="hours">00</span><label>Horas</label></div>
                <div class="time-box"><span id="minutes">00</span><label>Min</label></div>
                <div class="time-box"><span id="seconds">00</span><label>Seg</label></div>
            </div>
        </div>

        <div class="seccion">
            <img src="03_invitadosDeHonor.png" alt="Invitados" onerror="this.src='03_invitadosDeHonor.jpg'">
        </div>

        <div class="seccion">
            <img src="04_programa.png" alt="Programa" onerror="this.src='04_programa.jpg'">
        </div>

        <div class="seccion">
            <img src="05_recepcion.png" alt="Recepción" onerror="this.src='05_recepcion.jpg'">
            <a href="https://www.google.com/maps/place/La+Santina+Discoteca/@19.8506617,-97.4957672,17z/data=!3m1!4b1!4m6!3m5!1s0x85da95005bc2ced5:0xc4c0150bff80059!8m2!3d19.8506617!4d-97.4957672!16s%2Fg%2F11n9gr5g7t?entry=ttu&g_ep=EgoyMDI2MDYxMC4wIKXMDSoASAFQAw%3D%3D" target="_blank" class="btn-ubicacion">
                📍 Ubicación
            </a>
        </div>

        <div class="seccion">
            <img src="06_fechas.png" alt="Fechas" onerror="this.src='06_fechas.jpg'">
        </div>

        <div class="seccion">
            <img src="07_alumnos.png" alt="Fondo Lista" onerror="this.src='07_alumnos.jpg'">
            <div class="contenedor-scroll-alumnos" id="caja-lista-alumnos">
                <p style="text-align: center; color: #042a67; font-family: Arial;">Cargando alumnos...</p>
            </div>
        </div>

    </div>

    <script>
        // 1. EL CONTADOR ACTUALIZADO AL 15 DE JULIO A LAS 10:00
        const targetDate = new Date("July 15, 2026 10:00:00").getTime();
        const updateCountdown = setInterval(() => {
            const now = new Date().getTime();
            const difference = targetDate - now;

            const days = Math.floor(difference / (1000 * 60 * 60 * 24));
            const hours = Math.floor((difference % (1000 * 60 * 60 * 24)) / (1000 * 60 * 60));
            const minutes = Math.floor((difference % (1000 * 60 * 60)) / (1000 * 60));
            const seconds = Math.floor((difference % (1000 * 60)) / 1000);

            document.getElementById("days").innerText = days < 10 ? "0" + days : days;
            document.getElementById("hours").innerText = hours < 10 ? "0" + hours : hours;
            document.getElementById("minutes").innerText = minutes < 10 ? "0" + minutes : minutes;
            document.getElementById("seconds").innerText = seconds < 10 ? "0" + seconds : seconds;

            if (difference < 0) {
                clearInterval(updateCountdown);
                document.getElementById("countdown").innerHTML = "<p style='color:#042a67; font-weight:bold; font-size: 1.1rem; width:100%; text-align:center;'>¡HOY ES EL GRAN DÍA!</p>";
            }
        }, 1000);

        // 2. LECTOR AUTOMÁTICO DE EXCEL (CSV)
        fetch('salon1.csv')
            .then(response => {
                if (!response.ok) throw new Error("No se encontró el CSV");
                return response.text();
            })
            .then(data => {
                const renglones = data.split('\n');
                const cajaAlumnos = document.getElementById("caja-lista-alumnos");
                cajaAlumnos.innerHTML = ""; 

                for (let i = 1; i < renglones.length; i++) {
                    if (renglones[i].trim() === "") continue; 

                    const columnas = renglones[i].split(/[,;]/);
                    
                    const alumno = columnas[0] ? columnas[0].trim() : "";
                    const titulo = columnas[1] ? columnas[1].trim() : "Padrino"; // Lee si es Madrina o Padrinos
                    const nombrePadrino = columnas[2] ? columnas[2].trim() : "";

                    // Evita que aparezca la palabra si la celda del nombre está vacía
                    const textoEtiqueta = nombrePadrino ? `${titulo}: ${nombrePadrino}` : "";

                    const itemHTML = `
                        <div class="alumno-item">
                            <p class="alumno-nombre">${alumno}</p>
                            <p class="padrino-nombre">${textoEtiqueta}</p>
                        </div>
                    `;
                    cajaAlumnos.innerHTML += itemHTML;
                }
            })
            .catch(error => {
                console.error("Error:", error);
                document.getElementById("caja-lista-alumnos").innerHTML = "<p style='text-align: center; color: red;'>Falta subir el archivo salon1.csv a GitHub</p>";
            });
    </script>
</body>
</html>
